# Render each .qmd as a standalone HTML document. We intentionally do NOT
# declare `project.type: website` here — the website-project finalization
# step (search index, navbar, resource copying) reliably hangs in CI after
# execution completes. Rendering each file individually sidesteps that
# finalization entirely. See the CI workflow for the per-file render calls.

# Disable the Jupyter kernel daemon so each render starts fresh and exits
# cleanly. The daemon keeps a kernel alive between renders, which in
# one-shot CI runs can block the process from exiting.
execute:
  daemon: false

format:
  html:
    theme: cosmo
    toc: true
    code-fold: true
