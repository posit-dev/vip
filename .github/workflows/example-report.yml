name: Example Validation Report

on:
  workflow_call:

jobs:
  build:
    name: Build example report
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      # Skip Package Manager steps if the license secret is not configured
      - name: Check for RSPM_LICENSE
        id: pm-license
        run: |
          if [ -z "${{ secrets.RSPM_LICENSE }}" ]; then
            echo "RSPM_LICENSE secret not configured — skipping Package Manager steps"
            echo "available=false" >> "$GITHUB_OUTPUT"
          else
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check for WORKBENCH_LICENSE
        id: wb-license
        run: |
          if [ -z "${{ secrets.WORKBENCH_LICENSE }}" ]; then
            echo "WORKBENCH_LICENSE secret not configured — skipping Workbench steps"
            echo "available=false" >> "$GITHUB_OUTPUT"
          else
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi

      # Start Connect in Docker
      - name: Start Connect
        id: connect
        uses: posit-dev/with-connect@main
        with:
          version: release
          license: ${{ secrets.CONNECT_LICENSE }}

      # Start Workbench in Docker
      - name: Start Workbench
        if: steps.wb-license.outputs.available == 'true'
        id: workbench
        uses: posit-dev/with-workbench@main
        with:
          license-key: ${{ secrets.WORKBENCH_LICENSE }}
          version: release

      # Surface Workbench license errors
      - name: Check for Workbench license errors
        if: failure() && steps.wb-license.outputs.available == 'true' && steps.workbench.outcome == 'failure'
        run: |
          CID=$(docker ps -aq --filter "ancestor=rstudio/rstudio-workbench" | head -1)
          if [ -z "${CID}" ]; then
            echo "::error title=Workbench Startup Failed::Workbench container not found."
            exit 1
          fi
          LOGS=$(docker logs "${CID}" 2>&1 || true)
          LICENSE_MSG=$(echo "${LOGS}" | grep -i "license" | grep -iE "expired|invalid|unable|not activated" | head -1 || true)
          if [ -n "${LICENSE_MSG}" ]; then
            echo "::error title=Workbench License Error::${LICENSE_MSG}"
            {
              echo "## Workbench License Error"
              echo ""
              echo "The Workbench license key is expired or invalid. Update the \`WORKBENCH_LICENSE\` repository secret."
              echo ""
              echo '```'
              echo "${LICENSE_MSG}"
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "::error title=Workbench Startup Failed::Workbench failed to start. Check the 'Start Workbench' step logs."
          fi
          exit 1

      # Resolve Workbench version
      - name: Resolve Workbench version
        if: steps.wb-license.outputs.available == 'true'
        id: wb-version
        run: |
          curl -s -L -c /tmp/wb_cookies.txt \
            -d "username=${{ steps.workbench.outputs.WORKBENCH_USER }}&password=${{ steps.workbench.outputs.WORKBENCH_PASSWORD }}" \
            ${{ steps.workbench.outputs.WORKBENCH_URL }}/auth-sign-in > /dev/null

          RESPONSE=$(curl -s -b /tmp/wb_cookies.txt ${{ steps.workbench.outputs.WORKBENCH_URL }}/api/server-info)
          VERSION=$(echo "${RESPONSE}" | jq -r '.version // empty' 2>/dev/null || true)

          if [ -z "${VERSION}" ]; then
            VERSION=$(docker exec ${{ steps.workbench.outputs.CONTAINER_ID }} rstudio-server version 2>/dev/null \
                      | grep -oE '[0-9]{4}\.[0-9]+\.[0-9]+\+[^[:space:]]+' | head -1 || true)
          fi

          if [ -z "${VERSION}" ]; then
            echo "ERROR: Could not resolve Workbench version"
            exit 1
          fi

          echo "Resolved Workbench version: ${VERSION}"
          echo "resolved=${VERSION}" >> "$GITHUB_OUTPUT"

      # Resolve the actual Connect version for unambiguous job records
      - name: Resolve Connect version
        id: version
        run: |
          RESPONSE=$(curl -sf \
            -H "Authorization: Key ${{ steps.connect.outputs.CONNECT_API_KEY }}" \
            "${{ steps.connect.outputs.CONNECT_SERVER }}/__api__/server_settings")
          VERSION=$(echo "${RESPONSE}" | jq -r '.version')
          if [ -z "${VERSION}" ] || [ "${VERSION}" = "null" ]; then
            echo "ERROR: Could not resolve Connect version from server_settings"
            echo "Response body: ${RESPONSE}"
            exit 1
          fi
          echo "Resolved Connect version: ${VERSION}"
          echo "resolved=${VERSION}" >> "$GITHUB_OUTPUT"

      # Start Package Manager in Docker
      - name: Start Package Manager
        if: steps.pm-license.outputs.available == 'true'
        id: pm
        run: |
          docker run -d \
            --name packagemanager \
            -p 4242:4242 \
            -e RSPM_LICENSE="${{ secrets.RSPM_LICENSE }}" \
            rstudio/rstudio-package-manager:ubuntu2204-2024.08.0
          echo "PM_URL=http://localhost:4242" >> "$GITHUB_OUTPUT"

      # Wait for Package Manager health check
      - name: Wait for Package Manager to be ready
        if: steps.pm-license.outputs.available == 'true'
        run: |
          echo "Waiting for Package Manager to start..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:4242/__api__/status > /dev/null 2>&1; then
              echo "Package Manager is ready (attempt ${i})"
              exit 0
            fi
            sleep 2
          done
          echo "Package Manager failed to start within 120 seconds"
          docker logs packagemanager
          exit 1

      # Surface license errors as workflow annotations
      - name: Check for license errors
        if: failure() && steps.pm-license.outputs.available == 'true'
        run: |
          LOGS=$(docker logs packagemanager 2>&1 || true)
          LICENSE_MSG=$(echo "${LOGS}" | grep -i "license" | grep -iE "expired|invalid|unable|not activated" | head -1 || true)
          if [ -n "${LICENSE_MSG}" ]; then
            echo "::error title=License Error::${LICENSE_MSG}"
            {
              echo "## License Error"
              echo ""
              echo "The Package Manager license key is expired or invalid. Update the \`RSPM_LICENSE\` repository secret."
              echo ""
              echo '```'
              echo "${LICENSE_MSG}"
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      # Provision CRAN and PyPI repositories for smoke testing
      - name: Provision smoke test repositories
        if: steps.pm-license.outputs.available == 'true'
        run: |
          echo "Creating CRAN repository..."
          docker exec packagemanager /opt/rstudio-pm/bin/rspm create repo \
            --name=cran-all --type=r --description="CRAN mirror"
          docker exec packagemanager /opt/rstudio-pm/bin/rspm create source \
            --name=cran-mirror --type=cran-snapshot
          docker exec packagemanager /opt/rstudio-pm/bin/rspm subscribe \
            --repo=cran-all --source=cran-mirror

          echo "Creating PyPI repository..."
          docker exec packagemanager /opt/rstudio-pm/bin/rspm create repo \
            --name=pypi-all --type=python --description="PyPI mirror"

          echo "Repositories provisioned successfully"

      # Resolve the actual Package Manager version
      - name: Resolve Package Manager version
        if: steps.pm-license.outputs.available == 'true'
        id: pm-version
        run: |
          RESPONSE=$(curl -sf http://localhost:4242/__api__/status)
          VERSION=$(echo "${RESPONSE}" | jq -r '.version // empty')
          if [ -z "${VERSION}" ]; then
            VERSION="ubuntu2204-2024.08.0"
          fi
          echo "Resolved Package Manager version: ${VERSION}"
          echo "resolved=${VERSION}" >> "$GITHUB_OUTPUT"

      - uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Install Playwright browsers
        run: uv run playwright install chromium

      - uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: 1.9.37

      # Generate vip.toml from with-connect and PM outputs
      - name: Configure VIP for CI
        run: |
          PM_SECTION=""
          if [ "${{ steps.pm-license.outputs.available }}" = "true" ]; then
            PM_SECTION="
          [package_manager]
          enabled = true
          url = \"${{ steps.pm.outputs.PM_URL }}\"
          version = \"${{ steps.pm-version.outputs.resolved }}\""
          fi

          WB_SECTION=""
          WB_AUTH=""
          if [ "${{ steps.wb-license.outputs.available }}" = "true" ]; then
            WB_SECTION="
          [workbench]
          enabled = true
          url = \"${{ steps.workbench.outputs.WORKBENCH_URL }}\"
          version = \"${{ steps.wb-version.outputs.resolved }}\""
            WB_AUTH="
          username = \"${{ steps.workbench.outputs.WORKBENCH_USER }}\"
          password = \"${{ steps.workbench.outputs.WORKBENCH_PASSWORD }}\""
          fi

          DEPLOYMENT_NAME="CI Connect ${{ steps.version.outputs.resolved }}"
          if [ "${{ steps.wb-license.outputs.available }}" = "true" ]; then
            DEPLOYMENT_NAME="${DEPLOYMENT_NAME} + WB ${{ steps.wb-version.outputs.resolved }}"
          fi
          if [ "${{ steps.pm-license.outputs.available }}" = "true" ]; then
            DEPLOYMENT_NAME="${DEPLOYMENT_NAME} + PM ${{ steps.pm-version.outputs.resolved }}"
          fi

          cat > vip.toml << EOF
          [general]
          deployment_name = "${DEPLOYMENT_NAME}"

          [connect]
          enabled = true
          url = "${{ steps.connect.outputs.CONNECT_SERVER }}"
          api_key = "${{ steps.connect.outputs.CONNECT_API_KEY }}"
          version = "${{ steps.version.outputs.resolved }}"
          ${PM_SECTION}
          ${WB_SECTION}
          [auth]
          provider = "password"
          ${WB_AUTH}
          EOF

      - name: Run smoke tests and generate results
        env:
          VIP_ENABLE_EXPECTED_FAILURE_DEMO: "1"
        run: |
          uv run pytest \
            src/vip_tests/prerequisites/ \
            src/vip_tests/connect/test_auth.py \
            src/vip_tests/connect/test_users.py \
            src/vip_tests/connect/test_runtime_versions.py \
            src/vip_tests/connect/test_system_checks.py \
            src/vip_tests/security/test_error_handling.py \
            src/vip_tests/workbench/test_auth.py \
            src/vip_tests/package_manager/test_repos.py \
            -v \
            --vip-config=vip.toml \
          || true

      - name: Render Quarto report
        run: cd report && uv run quarto render

      # Stop Connect
      - name: Stop Connect
        if: always()
        uses: posit-dev/with-connect@main
        with:
          stop: ${{ steps.connect.outputs.CONTAINER_ID }}

      # Stop Package Manager
      - name: Stop Package Manager
        if: always() && steps.pm-license.outputs.available == 'true'
        run: docker stop packagemanager && docker rm packagemanager || true

      # Stop Workbench
      - name: Stop Workbench
        if: always() && steps.wb-license.outputs.available == 'true'
        uses: posit-dev/with-workbench@main
        with:
          stop: ${{ steps.workbench.outputs.CONTAINER_ID }}

      - name: Upload report artifact
        uses: actions/upload-artifact@v7
        with:
          name: example-report
          path: report/_output/
