name: Workbench Smoke Tests

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 7 * * *" # daily at 7am UTC

permissions:
  contents: read
  checks: write

jobs:
  workbench-smoke:
    if: github.actor != 'dependabot[bot]'
    name: Smoke test against Workbench ${{ matrix.workbench-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        workbench-version: ${{ github.event_name == 'schedule' && fromJSON('["2026.01.1", "release"]') || fromJSON('["2026.01.1"]') }}
    steps:
      - uses: actions/checkout@v6

      # Start Workbench in Docker
      - name: Start Workbench
        id: workbench
        uses: posit-dev/with-workbench@main
        with:
          license-key: ${{ secrets.WORKBENCH_LICENSE }}
          version: ${{ matrix.workbench-version }}

      # Surface license errors as workflow annotations so expired keys
      # are immediately visible on the Actions run page.
      - name: Check for license errors
        if: failure() && steps.workbench.outcome == 'failure'
        run: |
          CID=$(docker ps -aq --filter "ancestor=rstudio/rstudio-workbench" | head -1)
          if [ -z "${CID}" ]; then
            echo "::error title=Workbench Startup Failed::Workbench container not found. The with-workbench action failed before creating a container."
            exit 1
          fi
          LOGS=$(docker logs "${CID}" 2>&1 || true)
          LICENSE_MSG=$(echo "${LOGS}" | grep -i "license" | grep -iE "expired|invalid|unable|not activated" | head -1 || true)
          if [ -n "${LICENSE_MSG}" ]; then
            echo "::error title=License Error::${LICENSE_MSG}"
            {
              echo "## License Error"
              echo ""
              echo "The Workbench license key is expired or invalid. Update the \`WORKBENCH_LICENSE\` repository secret."
              echo ""
              echo '```'
              echo "${LICENSE_MSG}"
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "::error title=Workbench Startup Failed::Workbench failed to start. Check the 'Start Workbench' step logs for details."
          fi
          exit 1

      # Resolve the running Workbench version.
      # Primary: authenticated GET /api/server-info (sign in with -L to follow the
      #          302 redirect so all session cookies are captured).
      # Fallback: rstudio-server version command inside the container (queries the
      #           running binary directly; satisfies "verify the running instance").
      - name: Resolve Workbench version
        id: version
        run: |
          # Sign in - follow redirects (-L) so the session cookie jar is fully populated
          curl -s -L -c /tmp/wb_cookies.txt \
            -d "username=${{ steps.workbench.outputs.WORKBENCH_USER }}&password=${{ steps.workbench.outputs.WORKBENCH_PASSWORD }}" \
            ${{ steps.workbench.outputs.WORKBENCH_URL }}/auth-sign-in > /dev/null

          # Fetch server info with the authenticated session
          RESPONSE=$(curl -s -b /tmp/wb_cookies.txt ${{ steps.workbench.outputs.WORKBENCH_URL }}/api/server-info)
          VERSION=$(echo "${RESPONSE}" | jq -r '.version // empty' 2>/dev/null || true)

          # Fallback: query the running binary directly if the API didn't return JSON
          if [ -z "${VERSION}" ]; then
            echo "INFO: /api/server-info did not yield a version (response: ${RESPONSE:0:200})"
            echo "INFO: Falling back to rstudio-server version"
            VERSION=$(docker exec ${{ steps.workbench.outputs.CONTAINER_ID }} rstudio-server version 2>/dev/null \
                      | grep -oE '[0-9]{4}\.[0-9]+\.[0-9]+\+[^[:space:]]+' | head -1 || true)
          fi

          if [ -z "${VERSION}" ]; then
            echo "ERROR: Could not resolve version from the running Workbench instance"
            exit 1
          fi

          echo "Resolved Workbench version: ${VERSION}"
          echo "resolved=${VERSION}" >> "$GITHUB_OUTPUT"

      # Rename the check run so the job title shows the resolved version
      - name: Update job title with resolved version
        uses: actions/github-script@v9
        with:
          script: |
            const resolvedVersion = '${{ steps.version.outputs.resolved }}';
            const { data: { jobs } } = await github.rest.actions.listJobsForWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId,
            });
            const currentJob = jobs.find(
              j => j.status === 'in_progress' && j.name.includes('${{ matrix.workbench-version }}')
            );
            if (currentJob) {
              await github.rest.checks.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                check_run_id: currentJob.id,
                name: `Smoke test against Workbench ${resolvedVersion}`,
              });
            }

      # Set up Python and install VIP
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Install Playwright browsers
        run: uv run playwright install chromium

      # Generate vip.toml from with-workbench outputs
      - name: Configure VIP for CI Workbench
        run: |
          cat > vip.toml << EOF
          [general]
          deployment_name = "CI Workbench"

          [connect]
          enabled = false

          [workbench]
          enabled = true
          url = "${{ steps.workbench.outputs.WORKBENCH_URL }}"
          version = "${{ steps.version.outputs.resolved }}"

          [package_manager]
          enabled = false

          [auth]
          provider = "password"
          username = "${{ steps.workbench.outputs.WORKBENCH_USER }}"
          password = "${{ steps.workbench.outputs.WORKBENCH_PASSWORD }}"
          EOF

      # Run the subset of tests that work against Docker Workbench
      - name: Run Workbench smoke tests
        # -n 0 disables xdist (overriding -n auto from pyproject.toml) because
        # the Docker Workbench returns "Temporary server error" when multiple
        # workers attempt concurrent logins.
        run: |
          uv run pytest \
            src/vip_tests/prerequisites/test_components.py \
            src/vip_tests/workbench/test_auth.py \
            src/vip_tests/workbench/test_ide_launch.py \
            src/vip_tests/workbench/test_packages.py \
            src/vip_tests/workbench/test_data_sources.py \
            -v -k "workbench" -n 0 \
            --vip-config=vip.toml \
            --junitxml=smoke-results.xml

      # Upload test results for debugging failures
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: workbench-smoke-results-${{ matrix.workbench-version }}
          path: smoke-results.xml

      # Write a rich job summary with test details and emoji
      - name: Write workflow summary
        if: always()
        run: |
          RESOLVED="${{ steps.version.outputs.resolved }}"
          WB_URL="${{ steps.workbench.outputs.WORKBENCH_URL }}"
          REQUESTED="${{ matrix.workbench-version }}"
          RUN_DATE=$(date -u '+%Y-%m-%d %H:%M UTC')
          {
            echo "## 🧪 Workbench Smoke Tests — v${RESOLVED}"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| 🏷️ **Requested version** | \`${REQUESTED}\` |"
            echo "| ✅ **Resolved version** | \`${RESOLVED}\` |"
            echo "| 🌐 **Workbench URL** | \`${WB_URL}\` |"
            echo "| 📅 **Run date** | ${RUN_DATE} |"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"
          if [ -f smoke-results.xml ]; then
            TESTS=$(grep -oP '(?<=tests=")[^"]+' smoke-results.xml | head -1 || echo 0)
            FAILURES=$(grep -oP '(?<=failures=")[^"]+' smoke-results.xml | head -1 || echo 0)
            ERRORS=$(grep -oP '(?<=errors=")[^"]+' smoke-results.xml | head -1 || echo 0)
            SKIPPED=$(grep -oP '(?<=skipped=")[^"]+' smoke-results.xml | head -1 || echo 0)
            TESTS=${TESTS:-0}; FAILURES=${FAILURES:-0}; ERRORS=${ERRORS:-0}; SKIPPED=${SKIPPED:-0}
            PASSED=$(( TESTS - FAILURES - ERRORS - SKIPPED ))
            {
              echo "### 📊 Test Results"
              echo ""
              echo "| Result | Count |"
              echo "|--------|-------|"
              echo "| ✅ Passed | ${PASSED} |"
              echo "| ❌ Failed | ${FAILURES:-0} |"
              echo "| ⚠️ Errors | ${ERRORS:-0} |"
              echo "| ⏭️ Skipped | ${SKIPPED:-0} |"
              echo "| 📝 **Total** | **${TESTS:-0}** |"
              echo ""
              if [ "${FAILURES:-0}" = "0" ] && [ "${ERRORS:-0}" = "0" ]; then
                echo "🎉 **All tests passed!**"
              else
                echo "💥 **Some tests failed — check the logs for details.**"
              fi
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "> ⚠️ Test results file not found — tests may have been skipped." >> "$GITHUB_STEP_SUMMARY"
          fi

      # Stop and remove the Workbench container
      - name: Stop Workbench
        if: always()
        uses: posit-dev/with-workbench@main
        with:
          stop: ${{ steps.workbench.outputs.CONTAINER_ID }}

  status:
    name: Workbench Smoke Tests Status
    if: always()
    needs: [workbench-smoke]
    runs-on: ubuntu-latest
    steps:
      - name: Check smoke test result
        run: |
          if [ "${{ needs.workbench-smoke.result }}" = "failure" ] || [ "${{ needs.workbench-smoke.result }}" = "cancelled" ]; then
            echo "Workbench smoke tests failed or were cancelled"
            exit 1
          fi
          echo "Workbench smoke tests passed or were skipped"
