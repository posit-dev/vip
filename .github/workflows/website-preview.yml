name: Website Preview

on:
  pull_request:
    types: [opened, reopened, synchronize, closed]
    paths:
      - 'website/**'
      - 'src/vip/**'
      - 'src/vip_tests/**'
      - 'report/**'
      - 'scripts/generate-test-catalog.py'
      - 'scripts/generate-feature-matrix.py'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/website-preview.yml'
      - '.github/workflows/example-report.yml'

concurrency: website-preview-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write

jobs:
  example-report:
    if: github.event.action != 'closed'
    uses: ./.github/workflows/example-report.yml
    secrets: inherit

  preview:
    if: github.event.action != 'closed'
    needs: example-report
    name: Build & deploy website preview
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Sync Python dependencies
        run: uv sync --frozen

      - name: Generate test catalog and feature matrix
        run: |
          if [ -f scripts/generate-test-catalog.py ]; then
            uv run python scripts/generate-test-catalog.py
          fi
          if [ -f scripts/generate-feature-matrix.py ]; then
            uv run python scripts/generate-feature-matrix.py
          fi

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Build website
        run: |
          cd website
          npm ci
          npm run build -- --base /vip/pr-preview-site/pr-${{ github.event.pull_request.number }}/
          touch dist/.nojekyll

      - name: Download example report
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: example-report
          path: website/dist/example-report/

      - uses: rossjrw/pr-preview-action@ffa7509e91a3ec8dfc2e5536c4d5c1acdf7a6de9 # v1
        with:
          source-dir: website/dist/
          preview-branch: gh-pages
          umbrella-dir: pr-preview-site
          comment: false

      - uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # v3
        env:
          WEBSITE_URL: https://posit-dev.github.io/vip/pr-preview-site/pr-${{ github.event.pull_request.number }}/
          REPORT_URL: https://posit-dev.github.io/vip/pr-preview/pr-${{ github.event.pull_request.number }}/
          QR_PREFIX: https://qr.rossjrw.com/?color.dark=0d1117&url=
        with:
          header: preview-links
          message: |
            **Preview Links**

            | Website | Validation Report |
            |:---:|:---:|
            | <img src="${{ env.QR_PREFIX }}${{ env.WEBSITE_URL }}" height="100" alt="Website preview QR code"> | <img src="${{ env.QR_PREFIX }}${{ env.REPORT_URL }}" height="100" alt="Report preview QR code"> |
            | ${{ env.WEBSITE_URL }} | ${{ env.REPORT_URL }} |

  cleanup:
    if: github.event.action == 'closed'
    name: Clean up website preview
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: rossjrw/pr-preview-action@ffa7509e91a3ec8dfc2e5536c4d5c1acdf7a6de9 # v1
        with:
          source-dir: website/dist/
          preview-branch: gh-pages
          umbrella-dir: pr-preview-site
          comment: false
          action: remove

      - uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # v3
        with:
          header: preview-links
          delete: true
