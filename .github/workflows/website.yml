name: Deploy Website to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "website/**"
      - "src/vip_tests/**"
      - "report/**"
      - "src/vip/**"
      - "scripts/generate-test-catalog.py"
      - "scripts/generate-feature-matrix.py"
      - ".github/workflows/website.yml"
      - ".github/workflows/example-report.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  example-report:
    uses: ./.github/workflows/example-report.yml
    secrets: inherit

  deploy:
    needs: example-report
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Sync Python dependencies
        run: uv sync --frozen

      - name: Generate test catalog and feature matrix
        run: |
          if [ -f scripts/generate-test-catalog.py ]; then
            uv run python scripts/generate-test-catalog.py
          fi
          if [ -f scripts/generate-feature-matrix.py ]; then
            uv run python scripts/generate-feature-matrix.py
          fi

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Build website
        run: |
          cd website
          npm ci
          npm run build
          touch dist/.nojekyll

      - name: Download example report
        uses: actions/download-artifact@v8
        with:
          name: example-report
          path: website/dist/example-report/

      - uses: JamesIves/github-pages-deploy-action@v4.8.0
        with:
          branch: gh-pages
          folder: website/dist
          clean-exclude: |
            pr-preview/
            pr-preview-site/
          force: false
