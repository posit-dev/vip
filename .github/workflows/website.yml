name: Deploy Website to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "website/**"
      - "src/vip_tests/**"
      - "report/**"
      - "src/vip/**"
      - "scripts/generate-test-catalog.py"
      - "scripts/generate-feature-matrix.py"
      - ".github/workflows/website.yml"
      - ".github/workflows/example-report.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  example-report:
    uses: ./.github/workflows/example-report.yml
    secrets: inherit

  deploy:
    needs: example-report
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Sync Python dependencies
        run: uv sync --frozen

      - name: Generate test catalog and feature matrix
        run: |
          if [ -f scripts/generate-test-catalog.py ]; then
            uv run python scripts/generate-test-catalog.py
          fi
          if [ -f scripts/generate-feature-matrix.py ]; then
            uv run python scripts/generate-feature-matrix.py
          fi

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Build website
        run: |
          cd website
          npm ci
          npm run build
          touch dist/.nojekyll

      - name: Download example report
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: example-report
          path: website/dist/example-report/

      - uses: JamesIves/github-pages-deploy-action@d92aa235d04922e8f08b40ce78cc5442fcfbfa2f # v4.8.0
        with:
          branch: gh-pages
          folder: website/dist
          clean-exclude: |
            pr-preview/
            pr-preview-site/
          force: false
