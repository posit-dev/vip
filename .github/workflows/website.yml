name: Deploy Website to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "website/**"
      - "presentations/**"
      - "src/vip_tests/**"
      - "report/**"
      - "src/vip/**"
      - "scripts/generate-test-catalog.py"
      - "scripts/generate-feature-matrix.py"
      - ".github/workflows/website.yml"
      - ".github/workflows/example-report.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  example-report:
    uses: ./.github/workflows/example-report.yml
    secrets: inherit

  deploy:
    needs: example-report
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true

      - name: Sync Python dependencies
        run: uv sync --frozen

      - name: Generate test catalog and feature matrix
        run: |
          if [ -f scripts/generate-test-catalog.py ]; then
            uv run python scripts/generate-test-catalog.py
          fi
          if [ -f scripts/generate-feature-matrix.py ]; then
            uv run python scripts/generate-feature-matrix.py
          fi

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: website/package-lock.json

      - uses: quarto-dev/quarto-actions/setup@8a96df13519ee81fd526f2dfca5962811136661b # v2

      - name: Build website
        run: |
          cd website
          npm ci
          npm run build
          touch dist/.nojekyll

      # Render the standalone reveal.js decks into the built site so they are
      # served alongside it (e.g. posit-dev.github.io/vip/qa-overview/). Runs
      # after the Astro build, which clears website/dist.
      - name: Render presentations into the site
        run: |
          for deck in se-overview qa-overview; do
            quarto render "presentations/$deck/index.qmd"
            mkdir -p "website/dist/$deck"
            cp -R "presentations/$deck/index.html" \
                  "presentations/$deck/index_files" \
                  "presentations/$deck/images" \
                  "website/dist/$deck/"
          done

      - name: Download example report
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: example-report
          path: website/dist/example-report/

      - uses: JamesIves/github-pages-deploy-action@d92aa235d04922e8f08b40ce78cc5442fcfbfa2f # v4.8.0
        with:
          branch: gh-pages
          folder: website/dist
          clean-exclude: |
            pr-preview/
            pr-preview-site/
          force: false
