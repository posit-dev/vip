name: Report Preview

on:
  pull_request:
    types: [opened, reopened, synchronize, closed]
    paths:
      - 'report/**'
      - 'src/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/preview.yml'
      - '.github/workflows/example-report.yml'

concurrency: preview-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write

jobs:
  example-report:
    if: github.event.action != 'closed'
    uses: ./.github/workflows/example-report.yml
    secrets: inherit

  preview:
    if: github.event.action != 'closed'
    needs: example-report
    name: Deploy report preview
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download example report
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: example-report
          path: report/_output/

      - uses: rossjrw/pr-preview-action@ffa7509e91a3ec8dfc2e5536c4d5c1acdf7a6de9 # v1
        with:
          source-dir: report/_output/
          preview-branch: gh-pages
          umbrella-dir: pr-preview
          comment: false

  cleanup:
    if: github.event.action == 'closed'
    name: Clean up report preview
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: rossjrw/pr-preview-action@ffa7509e91a3ec8dfc2e5536c4d5c1acdf7a6de9 # v1
        with:
          source-dir: report/_output/
          preview-branch: gh-pages
          umbrella-dir: pr-preview
          action: remove
