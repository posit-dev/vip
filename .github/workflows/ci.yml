name: CI

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - 'src/**'
      - 'selftests/**'
      - 'examples/**'
      - 'docker/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/**'
      - '.github/zizmor.yml'

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: astral-sh/ruff-action@0ce1b0bf8b818ef400413f810f8a11cdbda0034b # v4.0.0
        name: Ruff lint
        with:
          version: "0.15.0"
          args: check src/ selftests/ examples/ docker/

      - uses: astral-sh/ruff-action@0ce1b0bf8b818ef400413f810f8a11cdbda0034b # v4.0.0
        name: Ruff format
        with:
          version: "0.15.0"
          args: format --check src/ selftests/ examples/ docker/

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run mypy
        run: uv run mypy src/vip/

  actions-lint:
    name: Actions Lint (zizmor)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Enforce SHA-pinned actions and credential hygiene
        env:
          ENFORCED_AUDITS: "unpinned-uses artipacked"
        run: |
          set +e
          zizmor_output=$(uvx zizmor==1.24.1 --config .github/zizmor.yml --format=json .github/workflows/)
          zizmor_status=$?
          set -e

          if [ "$zizmor_status" -ne 0 ] && [ -z "$zizmor_output" ]; then
            echo "::error::zizmor failed before producing JSON output."
            exit "$zizmor_status"
          fi

          fail=0
          for audit in $ENFORCED_AUDITS; do
            count=$(printf '%s\n' "$zizmor_output" \
              | jq --arg a "$audit" '[.[] | select(.ident == $a)] | length')
            if [ "$count" -gt 0 ]; then
              echo "::error::Found $count '$audit' finding(s). See documentation: https://docs.zizmor.sh/audits/#$audit"
              uvx zizmor==1.24.1 --config .github/zizmor.yml .github/workflows/ 2>&1 | grep -B1 -A6 "$audit" || true
              fail=1
            fi
          done

          [ "$fail" -eq 0 ] || exit 1

  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Audit dependencies
        run: uv run pip-audit --skip-editable

  selftest:
    name: Selftests (${{ matrix.os }} / ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --python ${{ matrix.python-version }} --all-extras

      - name: Verify import
        run: uv run python -c "import vip; print(vip.__version__)"

      - name: Run selftests
        run: uv run pytest selftests/ -v --junitxml=selftest-results.xml --cov=src/vip --cov-report=term-missing

      - name: Collect VIP tests (dry run)
        run: uv run pytest src/vip_tests/ --collect-only --quiet

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: selftest-results-${{ matrix.os }}-py${{ matrix.python-version }}
          path: selftest-results.xml

  selftests-status:
    name: Selftests Status
    if: always()
    needs: [selftest]
    runs-on: ubuntu-latest
    steps:
      - name: Check selftest matrix result
        run: |
          if [ "${{ needs.selftest.result }}" = "failure" ] || [ "${{ needs.selftest.result }}" = "cancelled" ]; then
            echo "Selftests failed or were cancelled"
            exit 1
          fi
          echo "Selftests passed or were skipped"

  lockfile-guard:
    name: Lockfile Guard
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      # Bot-generated plan/docs PRs have repeatedly carried a stale uv.lock from
      # an old base, which is invisible until it breaks the Dependency Audit
      # (vulnerable transitive pins) or conflicts with main on merge. A real
      # dependency change always touches pyproject.toml too, so a uv.lock change
      # on its own is the signal that the lockfile drifted in by accident.
      - name: Reject uv.lock changes without a pyproject.toml change
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          changed=$(git diff --name-only "$BASE_SHA...$HEAD_SHA")
          if printf '%s\n' "$changed" | grep -qx 'uv.lock' \
            && ! printf '%s\n' "$changed" | grep -qx 'pyproject.toml'; then
            echo "::error::uv.lock changed without a corresponding pyproject.toml change."
            echo "Plan/docs PRs must not carry a uv.lock update. Restore it with:"
            echo "    git checkout $BASE_SHA -- uv.lock && git commit -m 'restore uv.lock' uv.lock"
            echo "If this is an intentional dependency change, update pyproject.toml in the same PR."
            exit 1
          fi
          echo "uv.lock guard passed: no stray lockfile change detected."

