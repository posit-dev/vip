name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/ruff-action@v3
        name: Ruff lint
        with:
          version: "0.15.0"
          args: check src/ tests/ selftests/ examples/

      - uses: astral-sh/ruff-action@v3
        name: Ruff format
        with:
          version: "0.15.0"
          args: format --check src/ tests/ selftests/ examples/

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run mypy
        run: uv run mypy src/vip/

  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Audit dependencies
        run: |
          # CVE-2026-4539: ReDoS in pygments' AdlLexer (archetype.py), CVSS 3.3.
          # Requires local access; no network exposure. VIP never invokes the ADL lexer.
          # Pygments cannot be removed — it is a hard dependency of pytest, rich, ipython,
          # and the full Jupyter stack. No patched version exists upstream yet (reported at
          # https://github.com/pygments/pygments/issues/3058 but unaddressed as of 2026-03-24).
          # Re-evaluate when a fix is released.
          uv run pip-audit --skip-editable --ignore-vuln CVE-2026-4539

  selftest:
    name: Selftests (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --python ${{ matrix.python-version }} --all-extras

      - name: Verify import
        run: uv run python -c "import vip; print(vip.__version__)"

      - name: Run selftests
        run: uv run pytest selftests/ -v --junitxml=selftest-results.xml --cov=src/vip --cov-report=term-missing

      - name: Collect VIP tests (dry run)
        run: uv run pytest tests/ --collect-only --quiet

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: selftest-results-py${{ matrix.python-version }}
          path: selftest-results.xml

  verify-demo:
    name: Verify showboat demo
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - uses: extractions/setup-just@v3
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Find changed demo files
        id: check
        run: |
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }} -- 'validation_docs/*.md' | grep -v '.gitkeep' || true)
          if [ -z "$CHANGED" ]; then
            echo "No demo files changed — skipping verification"
            echo "found=false" >> "$GITHUB_OUTPUT"
          else
            echo "Demo files to verify:"
            echo "$CHANGED"
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "$CHANGED" > /tmp/demo-files.txt
          fi
      - name: Verify demos
        if: steps.check.outputs.found == 'true'
        run: |
          while IFS= read -r f; do
            echo "::group::Verifying $f"
            uvx showboat verify "$f"
            echo "::endgroup::"
          done < /tmp/demo-files.txt
