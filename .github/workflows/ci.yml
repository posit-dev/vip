name: CI

on:
  push:
    branches: [main]
  # No `paths:` filter here on purpose. Required status checks that live in this
  # workflow (Lint & Format, Selftests Status) must report on *every* PR. A
  # workflow-level path filter skips the whole run for docs/website-only PRs, so
  # those required checks never report and the PR is blocked forever ("Expected
  # — waiting for status to be reported"). Instead the workflow always runs and a
  # `changes` job below gates the expensive code jobs.
  pull_request:

jobs:
  # Detect whether this PR/push touches code that the CI jobs actually validate.
  # Expensive jobs gate on `relevant`; the always-run required checks (lint and
  # the Selftests Status shim) report success even when the code jobs are skipped.
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        with:
          filters: |
            relevant:
              - 'src/**'
              - 'selftests/**'
              - 'examples/**'
              - 'docker/**'
              - 'pyproject.toml'
              - 'uv.lock'
              - '.github/workflows/**'
              - '.github/zizmor.yml'
              - '.github/dependabot.yml'

  # Ruff is cheap (seconds) and "Lint & Format" is a required check, so it always
  # runs — no `changes` gate — to guarantee the required status always reports.
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: astral-sh/ruff-action@278981a28ce3188b1e39527901f38254bf3aac89 # v4.1.0
        name: Ruff lint
        with:
          version: "0.15.0"
          args: check src/ selftests/ examples/ docker/

      - uses: astral-sh/ruff-action@278981a28ce3188b1e39527901f38254bf3aac89 # v4.1.0
        name: Ruff format
        with:
          version: "0.15.0"
          args: format --check src/ selftests/ examples/ docker/

  typecheck:
    name: Type Check
    needs: [changes]
    if: needs.changes.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run mypy
        run: uv run mypy src/vip/

  actions-lint:
    name: Actions Lint (zizmor)
    needs: [changes]
    if: needs.changes.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      - name: Enforce SHA-pinned actions and credential hygiene
        env:
          ENFORCED_AUDITS: "unpinned-uses artipacked"
        run: |
          set +e
          zizmor_output=$(uvx zizmor==1.24.1 --config .github/zizmor.yml --format=json .github/workflows/)
          zizmor_status=$?
          set -e

          if [ "$zizmor_status" -ne 0 ] && [ -z "$zizmor_output" ]; then
            echo "::error::zizmor failed before producing JSON output."
            exit "$zizmor_status"
          fi

          fail=0
          for audit in $ENFORCED_AUDITS; do
            count=$(printf '%s\n' "$zizmor_output" \
              | jq --arg a "$audit" '[.[] | select(.ident == $a)] | length')
            if [ "$count" -gt 0 ]; then
              echo "::error::Found $count '$audit' finding(s). See documentation: https://docs.zizmor.sh/audits/#$audit"
              uvx zizmor==1.24.1 --config .github/zizmor.yml .github/workflows/ 2>&1 | grep -B1 -A6 "$audit" || true
              fail=1
            fi
          done

          [ "$fail" -eq 0 ] || exit 1

  audit:
    name: Dependency Audit
    needs: [changes]
    if: needs.changes.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true

      # Sync only the shipped runtime dependencies (no extras) and audit that
      # environment. A CVE disclosed in test-only tooling (jupyter, locust,
      # pip-audit, ...) must not block feature PRs. The full tree is scanned
      # daily by security-audit.yml, which files a tracking issue instead.
      - name: Audit runtime dependencies
        run: |
          uv sync
          uv run --with pip-audit pip-audit --skip-editable

  selftest:
    name: Selftests (${{ matrix.os }} / ${{ matrix.python-version }})
    needs: [changes]
    if: needs.changes.outputs.relevant == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --python ${{ matrix.python-version }} --all-extras

      - name: Verify import
        run: uv run python -c "import vip; print(vip.__version__)"

      - name: Run selftests
        run: uv run pytest selftests/ -v --junitxml=selftest-results.xml --cov=src/vip --cov-report=term-missing

      - name: Collect VIP tests (dry run)
        run: uv run pytest src/vip_tests/ --collect-only --quiet

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: selftest-results-${{ matrix.os }}-py${{ matrix.python-version }}
          path: selftest-results.xml

  # Always-run required check. Reports success when selftests pass OR when they
  # were skipped (docs/website-only PR), so the required "Selftests Status" check
  # always reports and never leaves the PR stuck waiting.
  selftests-status:
    name: Selftests Status
    if: always()
    needs: [changes, selftest]
    runs-on: ubuntu-latest
    steps:
      - name: Check selftest matrix result
        run: |
          if [ "${{ needs.changes.result }}" = "failure" ] || [ "${{ needs.changes.result }}" = "cancelled" ]; then
            echo "Change-detection job failed; cannot confirm selftest scope"
            exit 1
          fi
          if [ "${{ needs.selftest.result }}" = "failure" ] || [ "${{ needs.selftest.result }}" = "cancelled" ]; then
            echo "Selftests failed or were cancelled"
            exit 1
          fi
          echo "Selftests passed or were skipped"

  lockfile-guard:
    name: Lockfile Guard
    needs: [changes]
    # Dependabot legitimately ships lockfile-only updates (in-range bumps never
    # touch pyproject.toml), so it is exempt; the guard targets bot-generated
    # plan/docs PRs that carry a stale uv.lock by accident. A stray uv.lock in an
    # otherwise docs-only PR still flips `relevant` (uv.lock is in the filter), so
    # gating on it keeps the guard effective while skipping true docs-only PRs.
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.user.login != 'dependabot[bot]' &&
      needs.changes.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      # Bot-generated plan/docs PRs have repeatedly carried a stale uv.lock from
      # an old base, which is invisible until it breaks the Dependency Audit
      # (vulnerable transitive pins) or conflicts with main on merge. A real
      # dependency change always touches pyproject.toml too, so a uv.lock change
      # on its own is the signal that the lockfile drifted in by accident.
      - name: Reject uv.lock changes without a pyproject.toml change
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          changed=$(git diff --name-only "$BASE_SHA...$HEAD_SHA")
          if printf '%s\n' "$changed" | grep -qx 'uv.lock' \
            && ! printf '%s\n' "$changed" | grep -qx 'pyproject.toml'; then
            echo "::error::uv.lock changed without a corresponding pyproject.toml change."
            echo "Plan/docs PRs must not carry a uv.lock update. Restore it with:"
            echo "    git checkout $BASE_SHA -- uv.lock && git commit -m 'restore uv.lock' uv.lock"
            echo "If this is an intentional dependency change, update pyproject.toml in the same PR."
            exit 1
          fi
          echo "uv.lock guard passed: no stray lockfile change detected."
