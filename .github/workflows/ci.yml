name: CI

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - 'src/**'
      - 'selftests/**'
      - 'examples/**'
      - 'docker/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/**'
      - '.github/zizmor.yml'
      - '.github/dependabot.yml'

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: astral-sh/ruff-action@278981a28ce3188b1e39527901f38254bf3aac89 # v4.1.0
        name: Ruff lint
        with:
          version: "0.15.0"
          args: check src/ selftests/ examples/ docker/

      - uses: astral-sh/ruff-action@278981a28ce3188b1e39527901f38254bf3aac89 # v4.1.0
        name: Ruff format
        with:
          version: "0.15.0"
          args: format --check src/ selftests/ examples/ docker/

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run mypy
        run: uv run mypy src/vip/

  actions-lint:
    name: Actions Lint (zizmor)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Enforce SHA-pinned actions and credential hygiene
        env:
          ENFORCED_AUDITS: "unpinned-uses artipacked"
        run: |
          set +e
          zizmor_output=$(uvx zizmor==1.24.1 --config .github/zizmor.yml --format=json .github/workflows/)
          zizmor_status=$?
          set -e

          if [ "$zizmor_status" -ne 0 ] && [ -z "$zizmor_output" ]; then
            echo "::error::zizmor failed before producing JSON output."
            exit "$zizmor_status"
          fi

          fail=0
          for audit in $ENFORCED_AUDITS; do
            count=$(printf '%s\n' "$zizmor_output" \
              | jq --arg a "$audit" '[.[] | select(.ident == $a)] | length')
            if [ "$count" -gt 0 ]; then
              echo "::error::Found $count '$audit' finding(s). See documentation: https://docs.zizmor.sh/audits/#$audit"
              uvx zizmor==1.24.1 --config .github/zizmor.yml .github/workflows/ 2>&1 | grep -B1 -A6 "$audit" || true
              fail=1
            fi
          done

          [ "$fail" -eq 0 ] || exit 1

  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      # Sync only the shipped runtime dependencies (no extras) and audit that
      # environment. A CVE disclosed in test-only tooling (jupyter, locust,
      # pip-audit, ...) must not block feature PRs. The full tree is scanned
      # daily by security-audit.yml, which files a tracking issue instead.
      - name: Audit runtime dependencies
        run: |
          uv sync
          uv run --with pip-audit pip-audit --skip-editable

  selftest:
    name: Selftests (${{ matrix.os }} / ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --python ${{ matrix.python-version }} --all-extras

      - name: Verify import
        run: uv run python -c "import vip; print(vip.__version__)"

      - name: Run selftests
        run: uv run pytest selftests/ -v --junitxml=selftest-results.xml --cov=src/vip --cov-report=term-missing

      - name: Collect VIP tests (dry run)
        run: uv run pytest src/vip_tests/ --collect-only --quiet

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: selftest-results-${{ matrix.os }}-py${{ matrix.python-version }}
          path: selftest-results.xml

  selftests-status:
    name: Selftests Status
    if: always()
    needs: [selftest]
    runs-on: ubuntu-latest
    steps:
      - name: Check selftest matrix result
        run: |
          if [ "${{ needs.selftest.result }}" = "failure" ] || [ "${{ needs.selftest.result }}" = "cancelled" ]; then
            echo "Selftests failed or were cancelled"
            exit 1
          fi
          echo "Selftests passed or were skipped"

  lockfile-guard:
    name: Lockfile Guard
    # Dependabot legitimately ships lockfile-only updates (in-range bumps never
    # touch pyproject.toml), so it is exempt; the guard targets bot-generated
    # plan/docs PRs that carry a stale uv.lock by accident.
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.user.login != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      # Bot-generated plan/docs PRs have repeatedly carried a stale uv.lock from
      # an old base, which is invisible until it breaks the Dependency Audit
      # (vulnerable transitive pins) or conflicts with main on merge. A real
      # dependency change always touches pyproject.toml too, so a uv.lock change
      # on its own is the signal that the lockfile drifted in by accident.
      - name: Reject uv.lock changes without a pyproject.toml change
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          changed=$(git diff --name-only "$BASE_SHA...$HEAD_SHA")
          if printf '%s\n' "$changed" | grep -qx 'uv.lock' \
            && ! printf '%s\n' "$changed" | grep -qx 'pyproject.toml'; then
            echo "::error::uv.lock changed without a corresponding pyproject.toml change."
            echo "Plan/docs PRs must not carry a uv.lock update. Restore it with:"
            echo "    git checkout $BASE_SHA -- uv.lock && git commit -m 'restore uv.lock' uv.lock"
            echo "If this is an intentional dependency change, update pyproject.toml in the same PR."
            exit 1
          fi
          echo "uv.lock guard passed: no stray lockfile change detected."

  agentic-lockfile-guard:
    name: Agentic Workflow Lockfile Guard
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # The gh-aw .lock.yml files are compiled artifacts of the .md sources.
      # Dependabot bumps of the shared actions (checkout, github-script, etc.)
      # edit the .lock.yml copies without recompiling, leaving them stale. At
      # run time the workflow's stale-lock check then skips the agent and files
      # a failure issue (this is what broke an agentic workflow; see
      # #347). Recompile here and fail on any drift so it is caught in PR CI.
      # Pinned to the gh-aw version the lockfiles target
      # (github/gh-aw-actions/setup); bump this pin and recompile together.
      - name: Verify gh-aw lockfiles are freshly compiled
        run: |
          gh extension install github/gh-aw --pin v0.81.6 --force
          gh aw compile --no-check-update
          if ! git diff --exit-code .github/workflows/*.lock.yml; then
            echo "::error::gh-aw lockfiles are stale. Run 'gh aw compile' and commit the regenerated .lock.yml files."
            exit 1
          fi
          echo "gh-aw lockfile guard passed: all lockfiles match their sources."

