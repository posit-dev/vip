name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true

      - name: Assert tag matches pyproject version
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          proj_version="$(uv version --short)"
          if [ "$tag_version" != "$proj_version" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} (=$tag_version) does not match pyproject version $proj_version"
            exit 1
          fi
          echo "Tag and pyproject version agree: $proj_version"

      - name: Build wheel and sdist
        run: uv build

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: dist
          path: dist/

  release:
    name: Attach locked constraints to release
    # Gate on build so the tag/version-alignment assertion also protects the
    # GitHub release: a mistagged tag fails build and never publishes a release.
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          # Need history back to the previous tag to build the compare link.
          fetch-depth: 0

      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true

      - name: Resolve release version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      # --frozen guarantees the exported set is exactly the committed uv.lock,
      # never a silent re-resolve.
      - name: Export locked constraints
        run: |
          uv export --frozen --no-emit-project --no-hashes --format requirements.txt \
            -o "constraints-${VERSION}.txt"

      # Reproduces the body semantic-release attached via --vcs-release: the
      # CHANGELOG.md section for this version (including its "## vX.Y.Z (date)"
      # heading), plus a compare-link footer. The heading is matched literally
      # (index/==) so version numbers are never treated as regex patterns.
      - name: Build release notes from changelog
        run: |
          awk -v tag="v${VERSION}" '
            index($0, "## " tag " ") == 1 || $0 == "## " tag {found=1; print; next}
            found && /^## v/ {exit}
            found {print}
            END {if (!found) exit 1}
          ' CHANGELOG.md > release-notes.md
          # An empty file means the heading was not found (e.g. changelog format
          # drift); fail loudly rather than publish a blank-body release.
          if [ ! -s release-notes.md ]; then
            echo "::error::No CHANGELOG.md section found for ${GITHUB_REF_NAME}; check heading format"
            exit 1
          fi
          prev=$(git describe --tags --abbrev=0 "${GITHUB_REF_NAME}^" 2>/dev/null || true)
          if [ -n "$prev" ]; then
            printf '\n---\n\n**Detailed Changes**: [%s...%s](https://github.com/%s/compare/%s...%s)\n' \
              "$prev" "${GITHUB_REF_NAME}" "${GITHUB_REPOSITORY}" "$prev" "${GITHUB_REF_NAME}" \
              >> release-notes.md
          fi

      # Immutable releases lock their assets at publish time, so the constraints
      # file must be attached while the release is still a draft, then published.
      # semantic-release no longer creates the release (--no-vcs-release in
      # release.yml); this job owns it end to end. The create step is idempotent
      # so a re-run after a partial failure refreshes the draft's asset instead
      # of erroring on an already-existing release, and the asset is verified
      # present before the release is published and locked.
      - name: Publish release with constraints attached
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF_NAME}"
          file="constraints-${VERSION}.txt"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" "$file" --clobber
          else
            gh release create "$tag" "$file" \
              --draft \
              --title "$tag" \
              --notes-file release-notes.md
          fi
          gh release view "$tag" --json assets --jq '.assets[].name' | grep -qxF "$file"
          gh release edit "$tag" --draft=false

  publish:
    name: Publish to PyPI
    # Also gate on release: PyPI publishes are irreversible, so never publish a
    # version when the GitHub release / constraints step failed — fix and re-run
    # (the release job is idempotent) rather than strand a version on PyPI
    # without its matching release assets.
    needs: [build, release]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/posit-vip
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          attestations: true

  smoke-published:
    name: Smoke-test published package
    needs: publish
    runs-on: ubuntu-latest
    # Installs from public PyPI and runs the CLI — needs no GITHUB_TOKEN scopes.
    permissions: {}
    steps:
      - name: Resolve release version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.12'

      # PyPI needs a moment to index a fresh release; retry install before asserting.
      - name: Install the published package
        run: |
          for attempt in 1 2 3 4 5 6; do
            if pip install "posit-vip==${VERSION}"; then
              echo "Installed posit-vip==${VERSION}"
              exit 0
            fi
            echo "posit-vip==${VERSION} not indexed yet (attempt $attempt/6); waiting 20s"
            sleep 20
          done
          echo "::error::posit-vip==${VERSION} never became installable from PyPI"
          exit 1

      - name: Verify the CLI runs
        run: |
          vip --version
          vip --version | grep -qF "${VERSION}"
