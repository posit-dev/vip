name: Connect Smoke Tests

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/connect-smoke.yml'
  pull_request:

permissions:
  contents: read
  checks: write

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            relevant:
              - 'src/vip_tests/connect/**'
              - 'src/vip/clients/connect.py'
              # shared across all smoke workflows:
              - 'src/vip_tests/prerequisites/**'
              # connect-only shared tests:
              - 'src/vip_tests/security/**'
              # shared core — affects all products:
              - 'src/vip/auth.py'
              - 'src/vip/idp.py'
              - 'src/vip/config.py'
              - 'src/vip/plugin.py'
              - 'src/vip/cli.py'
              - 'src/vip_tests/conftest.py'
              - 'pyproject.toml'
              - 'uv.lock'
              - '.github/workflows/connect-smoke.yml'

  connect-smoke:
    needs: [changes]
    if: needs.changes.outputs.relevant == 'true'
    name: Smoke test against Connect ${{ matrix.connect-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # `release` (no version suffix) always resolves to the latest Connect build.
        connect-version: ["release"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # Start Connect in Docker
      - name: Start Connect
        id: connect
        uses: posit-dev/with-connect@4f26a6a301716789d6451cc3afd878afdd52189b # main
        with:
          version: ${{ matrix.connect-version }}
          license: ${{ secrets.CONNECT_LICENSE }}

      # Surface license errors as workflow annotations so expired keys
      # are immediately visible on the Actions run page.
      - name: Check for license errors
        if: failure() && steps.connect.outcome == 'failure'
        run: |
          # Find the Connect container even if with-connect failed partway
          CID=$(docker ps -aq --filter "ancestor=rstudio/rstudio-connect" | head -1)
          if [ -z "${CID}" ]; then
            echo "::error title=Connect Startup Failed::Connect container not found. The with-connect action failed before creating a container."
            exit 1
          fi
          LOGS=$(docker logs "${CID}" 2>&1 || true)
          LICENSE_MSG=$(echo "${LOGS}" | grep -i "license" | grep -iE "expired|invalid|unable" | head -1 || true)
          if [ -n "${LICENSE_MSG}" ]; then
            echo "::error title=License Error::${LICENSE_MSG}"
            {
              echo "## License Error"
              echo ""
              echo "The Connect license key is expired or invalid. Update the \`CONNECT_LICENSE\` repository secret."
              echo ""
              echo '```'
              echo "${LICENSE_MSG}"
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "::error title=Connect Startup Failed::Connect failed to start. Check the 'Start Connect' step logs for details."
          fi
          exit 1

      # Resolve the actual Connect version for unambiguous job records
      - name: Resolve Connect version
        id: version
        run: |
          RESPONSE=$(curl -sf \
            -H "Authorization: Key ${{ steps.connect.outputs.CONNECT_API_KEY }}" \
            "${{ steps.connect.outputs.CONNECT_SERVER }}/__api__/server_settings")
          VERSION=$(echo "${RESPONSE}" | jq -r '.version')
          if [ -z "${VERSION}" ] || [ "${VERSION}" = "null" ]; then
            echo "ERROR: Could not resolve Connect version from server_settings"
            echo "Response body: ${RESPONSE}"
            exit 1
          fi
          echo "Resolved Connect version: ${VERSION}"
          echo "resolved=${VERSION}" >> "$GITHUB_OUTPUT"

      # Rename the check run so the job title shows the resolved version
      - name: Update job title with resolved version
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const resolvedVersion = '${{ steps.version.outputs.resolved }}';
            const { data: { jobs } } = await github.rest.actions.listJobsForWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId,
            });
            const currentJob = jobs.find(
              j => j.status === 'in_progress' && j.name.includes('${{ matrix.connect-version }}')
            );
            if (currentJob) {
              await github.rest.checks.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                check_run_id: currentJob.id,
                name: `Smoke test against Connect ${resolvedVersion}`,
              });
            }

      # Set up Python and install VIP
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Resolve Playwright version
        id: playwright-version
        run: echo "version=$(uv run playwright --version | awk '{print $2}')" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        run: uv run vip install --skip-system

      # Generate vip.toml from with-connect outputs
      - name: Configure VIP for CI Connect
        run: |
          cat > vip.toml << EOF
          [general]
          deployment_name = "CI Connect"

          [connect]
          enabled = true
          url = "${{ steps.connect.outputs.CONNECT_SERVER }}"
          api_key = "${{ steps.connect.outputs.CONNECT_API_KEY }}"
          version = "${{ steps.version.outputs.resolved }}"

          [auth]
          provider = "password"
          username = "__bootstrap_admin__"
          EOF

      # Run the full Connect API test suite against Docker Connect (excluding the UI login scenario)
      - name: Run Connect smoke tests
        run: |
          uv run pytest \
            src/vip_tests/prerequisites/test_components.py \
            src/vip_tests/connect/test_auth.py \
            src/vip_tests/connect/test_users.py \
            src/vip_tests/connect/test_runtime_versions.py \
            src/vip_tests/connect/test_system_checks.py \
            src/vip_tests/connect/test_content_deploy.py \
            src/vip_tests/connect/test_packages.py \
            src/vip_tests/connect/test_email.py \
            src/vip_tests/connect/test_data_sources.py \
            src/vip_tests/connect/test_chronicle.py \
            src/vip_tests/security/test_error_handling.py \
            -v \
            -k "not connect_login_ui" \
            --vip-config=vip.toml \
            --junitxml=smoke-results.xml
        env:
          VIP_CONNECT_API_KEY: ${{ steps.connect.outputs.CONNECT_API_KEY }}

      # Upload test results for debugging failures
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: connect-smoke-results-${{ matrix.connect-version }}
          path: smoke-results.xml

      # Write a rich job summary with test details and emoji
      - name: Write workflow summary
        if: always()
        run: |
          RESOLVED="${{ steps.version.outputs.resolved }}"
          CONNECT_URL="${{ steps.connect.outputs.CONNECT_SERVER }}"
          REQUESTED="${{ matrix.connect-version }}"
          RUN_DATE=$(date -u '+%Y-%m-%d %H:%M UTC')
          {
            echo "## 🧪 Connect Smoke Tests — v${RESOLVED}"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| 🏷️ **Requested version** | \`${REQUESTED}\` |"
            echo "| ✅ **Resolved version** | \`${RESOLVED}\` |"
            echo "| 🌐 **Connect URL** | \`${CONNECT_URL}\` |"
            echo "| 📅 **Run date** | ${RUN_DATE} |"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"
          if [ -f smoke-results.xml ]; then
            TESTS=$(grep -oP '(?<=tests=")[^"]+' smoke-results.xml | head -1 || echo 0)
            FAILURES=$(grep -oP '(?<=failures=")[^"]+' smoke-results.xml | head -1 || echo 0)
            ERRORS=$(grep -oP '(?<=errors=")[^"]+' smoke-results.xml | head -1 || echo 0)
            SKIPPED=$(grep -oP '(?<=skipped=")[^"]+' smoke-results.xml | head -1 || echo 0)
            TESTS=${TESTS:-0}; FAILURES=${FAILURES:-0}; ERRORS=${ERRORS:-0}; SKIPPED=${SKIPPED:-0}
            PASSED=$(( TESTS - FAILURES - ERRORS - SKIPPED ))
            {
              echo "### 📊 Test Results"
              echo ""
              echo "| Result | Count |"
              echo "|--------|-------|"
              echo "| ✅ Passed | ${PASSED} |"
              echo "| ❌ Failed | ${FAILURES:-0} |"
              echo "| ⚠️ Errors | ${ERRORS:-0} |"
              echo "| ⏭️ Skipped | ${SKIPPED:-0} |"
              echo "| 📝 **Total** | **${TESTS:-0}** |"
              echo ""
              if [ "${FAILURES:-0}" = "0" ] && [ "${ERRORS:-0}" = "0" ]; then
                echo "🎉 **All tests passed!**"
              else
                echo "💥 **Some tests failed — check the logs for details.**"
              fi
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "> ⚠️ Test results file not found — tests may have been skipped." >> "$GITHUB_STEP_SUMMARY"
          fi

      # Stop Connect
      - name: Stop Connect
        if: always()
        uses: posit-dev/with-connect@4f26a6a301716789d6451cc3afd878afdd52189b # main
        with:
          stop: ${{ steps.connect.outputs.CONTAINER_ID }}

  status:
    name: Connect Smoke Tests Status
    if: always()
    needs: [changes, connect-smoke]
    runs-on: ubuntu-latest
    steps:
      - name: Check smoke test result
        run: |
          if [ "${{ needs.changes.result }}" = "failure" ] || [ "${{ needs.changes.result }}" = "cancelled" ]; then
            echo "Change-detection job failed; cannot confirm smoke scope"
            exit 1
          fi
          if [ "${{ needs.connect-smoke.result }}" = "failure" ] || [ "${{ needs.connect-smoke.result }}" = "cancelled" ]; then
            echo "Connect smoke tests failed or were cancelled"
            exit 1
          fi
          echo "Connect smoke tests passed or were skipped"
