name: Mock-IdP E2E Tests

# Exercises VIP's OIDC auth flows (--headless-auth and --interactive-auth)
# against real Connect and Workbench containers fronted by a real, seeded
# Keycloak realm -- no customer IdP required. See
# thoughts/shared/plans/2026-06-30-issue-409-robust-cicd-design.md (Child A).
#
# Unlike the smoke workflows (password auth against bare containers), this
# workflow is the only one that exercises the vip.idp Keycloak strategy and
# the OIDC branches of auth.py end-to-end with a real IdP round-trip.

on:
  push:
    branches: [main]
    paths:
      - 'src/vip/auth.py'
      - 'src/vip/idp.py'
      - 'src/vip/totp.py'
      - 'src/vip/cli.py'
      - 'src/vip_tests/conftest.py'
      - 'src/vip_tests/connect/test_auth.py'
      - 'src/vip_tests/connect/test_auth.feature'
      - 'src/vip_tests/workbench/test_auth.py'
      - 'src/vip_tests/workbench/test_auth.feature'
      - 'docker/keycloak/**'
      - 'docker/connect/**'
      - 'docker/workbench/**'
      - 'docker/tls/**'
      - 'compose.mock-idp.yml'
      - 'Dockerfile'
      - '.github/workflows/mock-idp-e2e.yml'
  pull_request:
    paths:
      - 'src/vip/auth.py'
      - 'src/vip/idp.py'
      - 'src/vip/totp.py'
      - 'src/vip/cli.py'
      - 'src/vip_tests/conftest.py'
      - 'src/vip_tests/connect/test_auth.py'
      - 'src/vip_tests/connect/test_auth.feature'
      - 'src/vip_tests/workbench/test_auth.py'
      - 'src/vip_tests/workbench/test_auth.feature'
      - 'docker/keycloak/**'
      - 'docker/connect/**'
      - 'docker/workbench/**'
      - 'docker/tls/**'
      - 'compose.mock-idp.yml'
      - 'Dockerfile'
      - '.github/workflows/mock-idp-e2e.yml'
  schedule:
    - cron: "30 5 * * *" # daily at 5:30am UTC
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mock-idp-e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Emit the Workbench version list for the E2E job. PR/push runs test only the
  # latest release (single required check, unchanged). Scheduled/manual runs fan
  # out across the Workbench support window (current + 2 back) — same list as
  # workbench-smoke.yml. Connect stays pinned to its stack default here; the
  # Connect version matrix lives in connect-smoke.yml (#441). Bump the pinned
  # tags when a new Workbench release ships; `release` always tracks newest.
  set-matrix:
    runs-on: ubuntu-latest
    permissions: {}
    outputs:
      versions: ${{ steps.pick.outputs.versions }}
    steps:
      - id: pick
        run: |
          if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo 'versions=["release", "2026.06.0", "2026.05.1"]' >> "$GITHUB_OUTPUT"
          else
            echo 'versions=["release"]' >> "$GITHUB_OUTPUT"
          fi

  mock-idp-e2e:
    needs: [set-matrix]
    name: Mock-IdP E2E (headless-auth) — Workbench ${{ matrix.workbench-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        workbench-version: ${{ fromJSON(needs.set-matrix.outputs.versions) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # All three services share one throwaway CA and terminate TLS under
      # *.vip.test -- both Connect's OpenIDConnectIssuer and Workbench's
      # auth-openid-issuer reject self-signed / bare-HTTP issuers. The runner
      # (VIP + Playwright's Chromium, via --ca-bundle) needs the same
      # hostnames to resolve to the published container ports.
      - name: Add vip.test hostnames
        run: |
          echo "127.0.0.1 keycloak.vip.test connect.vip.test workbench.vip.test" | sudo tee -a /etc/hosts

      # RSW_VERSION is the Workbench image tag baked into the compose build
      # (FROM rstudio/rstudio-workbench:${RSW_VERSION}). `release` maps to the
      # `latest` tag — the stack's existing default — so the PR/newest leg is
      # unchanged; pinned versions map to the `jammy-<version>` tags.
      - name: Start mock-IdP stack (Keycloak + Connect + Workbench)
        env:
          RSC_LICENSE: ${{ secrets.CONNECT_LICENSE }}
          RSW_LICENSE: ${{ secrets.WORKBENCH_LICENSE }}
          RSW_VERSION: ${{ matrix.workbench-version == 'release' && 'latest' || format('jammy-{0}', matrix.workbench-version) }}
        run: docker compose -f compose.mock-idp.yml up -d --build --wait

      # The default `docker` driver can't export to the GHA cache backend
      # (`type=gha` requires a buildx builder) -- see docker.yml for the same
      # pairing.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Build VIP runner image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          load: true
          tags: vip-mock-idp-runner:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Bind-mounted into the runner container so its JSON/JUnit output lands
      # on the workflow runner's filesystem for the upload-artifact step
      # below.
      - name: Create output directory for test results
        run: mkdir -m 777 -p mock-idp-out

      # Runs on the host network so the container can resolve *.vip.test the
      # same way the runner just configured via /etc/hosts, and reach the
      # compose stack's published ports directly. Overrides the image's
      # default `uv run pytest` entrypoint to drive the CLI directly, the
      # same way a real user would.
      #
      # `--ca-bundle` only reaches Node/httpx's own TLS stack (NODE_EXTRA_CA_
      # CERTS) -- Playwright's Chromium on Linux validates certs against its
      # own NSS database (cert9.db), never the OS/OpenSSL trust store, so
      # `update-ca-certificates` alone has no effect on it (confirmed:
      # https://github.com/microsoft/playwright/issues/28967). The CA must
      # also be seeded into NSS via `certutil` (from libnss3-tools, not
      # installed by default) at the path Chromium actually reads:
      # sql:$HOME/.pki/nssdb. Runs as root (--user root) so apt-get/
      # update-ca-certificates/certutil can all write -- this is an
      # ephemeral, single-purpose CI container, not a shared host, so the
      # image's normal non-root convention doesn't buy anything here.
      #
      # --interactive-auth is intentionally NOT exercised by this job. This is
      # a settled headless-only CI stance, not deferred work: unlike
      # --headless-auth, it opens a headed browser and blocks waiting for a
      # *human* to click through the IdP's login form (auth.py's
      # start_interactive_auth has no form-filling logic of its own).
      # Automating it would need a second process driving the browser over
      # CDP (plus Xvfb, since this path insists on headless=False) while vip
      # verify blocks in the first process -- for thin marginal coverage,
      # since that second process's form-filling is test scaffolding that no
      # production code path shares. See the decision record at
      # thoughts/shared/plans/2026-07-08-issue-430-interactive-auth-headless-only.md
      # and the unit tests in selftests/test_auth.py
      # (TestStartInteractiveAuthPollLoop) covering the interactive-only
      # login-detection logic this stance relies on.
      # VIP_TEST_TOTP_SECRET is read from /certs/totp-secret.b32 at runtime
      # (generated by docker/keycloak/gen-totp-secret.sh into the shared
      # mock-idp-certs volume) rather than hardcoded here, since it must be
      # the base32 encoding of whatever raw secret cert-init baked into the
      # realm's seeded otp secretData.value -- see that script for why
      # Keycloak and pyotp need two different representations of one secret.
      - name: Run headless-auth E2E (Connect + Workbench)
        run: |
          docker run --rm --network host --user root \
            -v vip-mock-idp_mock-idp-certs:/certs:ro \
            -v "${{ github.workspace }}/mock-idp-out:/app/out" \
            -e VIP_TEST_USERNAME=vip_test \
            -e VIP_TEST_PASSWORD=vip_test_password \
            --entrypoint sh \
            vip-mock-idp-runner:latest \
            -c '
              cp /certs/ca.crt /usr/local/share/ca-certificates/vip-mock-idp-ca.crt &&
              update-ca-certificates &&
              apt-get update -qq && apt-get install -qq -y libnss3-tools > /dev/null &&
              mkdir -p "$HOME/.pki/nssdb" &&
              certutil -d "sql:$HOME/.pki/nssdb" -N --empty-password &&
              certutil -d "sql:$HOME/.pki/nssdb" -A -t "C,," -n vip-mock-idp-ca -i /certs/ca.crt &&
              export VIP_TEST_TOTP_SECRET="$(cat /certs/totp-secret.b32)" &&
              exec uv run vip verify \
                --connect-url https://connect.vip.test:3939 \
                --workbench-url https://workbench.vip.test:8787 \
                --ca-bundle /certs/ca.crt \
                --headless-auth --idp keycloak \
                --categories "connect or workbench" \
                --filter "test_connect_login_ui or test_workbench_login" \
                --report out/results.json \
                -- --junitxml=out/mock-idp-results.xml --vip-verbose
            '

      # Placed after the E2E step (not just after "Start mock-IdP stack") so
      # a failure during the actual login flow -- not just container
      # startup -- still surfaces Keycloak/Connect/Workbench container logs
      # for diagnosis. `docker compose logs` also emits `if: failure()`
      # logs from a startup failure by the time this runs, since the
      # containers are still up (torn down separately, below).
      - name: Surface stack logs on failure
        if: failure()
        run: docker compose -f compose.mock-idp.yml logs

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: mock-idp-e2e-results-headless-${{ matrix.workbench-version }}
          path: mock-idp-out/
          if-no-files-found: ignore

      - name: Stop mock-IdP stack
        if: always()
        run: docker compose -f compose.mock-idp.yml down -v

  status:
    name: Mock-IdP E2E Status
    if: always()
    needs: [set-matrix, mock-idp-e2e]
    runs-on: ubuntu-latest
    steps:
      - name: Check result
        run: |
          # A failed set-matrix skips (not fails) mock-idp-e2e, which the
          # check below would otherwise read as a clean skip.
          if [ "${{ needs.set-matrix.result }}" = "failure" ] || [ "${{ needs.set-matrix.result }}" = "cancelled" ]; then
            echo "Version-matrix job failed; cannot confirm E2E scope"
            exit 1
          fi
          if [ "${{ needs.mock-idp-e2e.result }}" = "failure" ] || [ "${{ needs.mock-idp-e2e.result }}" = "cancelled" ]; then
            echo "Mock-IdP E2E tests failed or were cancelled"
            exit 1
          fi
          echo "Mock-IdP E2E tests passed or were skipped"
