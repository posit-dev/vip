name: Package Manager Smoke Tests

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/packagemanager-smoke.yml'
  pull_request:
  # Scheduled/manual runs fan the suite out across the Package Manager support
  # window (see the set-matrix job). PR/push runs stay single-version.
  schedule:
    - cron: "30 6 * * *" # daily at 06:30 UTC (staggered from the other smoke workflows)
  workflow_dispatch:

permissions:
  contents: read
  checks: write

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        with:
          filters: |
            relevant:
              - 'src/vip_tests/package_manager/**'
              - 'src/vip/clients/packagemanager.py'
              # shared across all smoke workflows:
              - 'src/vip_tests/prerequisites/**'
              # shared core — affects all products:
              - 'src/vip/auth.py'
              - 'src/vip/idp.py'
              - 'src/vip/config.py'
              - 'src/vip/plugin.py'
              - 'src/vip/cli.py'
              - 'src/vip/clients/base.py'
              - 'src/vip/timeouts.py'
              - 'src/vip_tests/conftest.py'
              - 'pyproject.toml'
              - 'uv.lock'
              - '.github/workflows/packagemanager-smoke.yml'

  # Emit the Package Manager tag list for the product job. PR/push runs test
  # only the latest release (single required check, unchanged). Scheduled/manual
  # runs fan out across the support window (current + 2 back). Bump the pinned
  # tags here when a new PM release ships; `ubuntu2204` (no version suffix)
  # always resolves to the latest PM build. Pinned tags are pulled directly as
  # rstudio/rstudio-package-manager:<tag>.
  set-matrix:
    runs-on: ubuntu-latest
    permissions: {}
    outputs:
      versions: ${{ steps.pick.outputs.versions }}
    steps:
      - id: pick
        run: |
          if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo 'versions=["ubuntu2204", "ubuntu2204-2026.05.0", "ubuntu2204-2026.04.2"]' >> "$GITHUB_OUTPUT"
          else
            echo 'versions=["ubuntu2204"]' >> "$GITHUB_OUTPUT"
          fi

  packagemanager-smoke:
    needs: [changes, set-matrix]
    # Scheduled/manual runs always execute (no PR diff for paths-filter to
    # score); PR/push runs still gate on the changed-paths filter.
    if: >-
      needs.changes.outputs.relevant == 'true'
      || github.event_name == 'schedule'
      || github.event_name == 'workflow_dispatch'
    name: Smoke test against Package Manager ${{ matrix.pm-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pm-version: ${{ fromJSON(needs.set-matrix.outputs.versions) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # Skip the entire job if the license secret is not configured
      - name: Check for RSPM_LICENSE
        id: license
        run: |
          if [ -z "${{ secrets.RSPM_LICENSE }}" ]; then
            echo "RSPM_LICENSE secret not configured — skipping PM smoke tests"
            echo "available=false" >> "$GITHUB_OUTPUT"
          else
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi

      # Start Package Manager in Docker
      - name: Start Package Manager
        if: steps.license.outputs.available == 'true'
        id: pm
        run: |
          docker run -d \
            --name packagemanager \
            -p 4242:4242 \
            -e RSPM_LICENSE="${{ secrets.RSPM_LICENSE }}" \
            rstudio/rstudio-package-manager:${{ matrix.pm-version }}
          echo "PM_URL=http://localhost:4242" >> "$GITHUB_OUTPUT"

      # Wait for health check
      - name: Wait for Package Manager to be ready
        if: steps.license.outputs.available == 'true'
        run: |
          echo "Waiting for Package Manager to start..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:4242/__api__/status > /dev/null 2>&1; then
              echo "Package Manager is ready (attempt ${i})"
              exit 0
            fi
            sleep 2
          done
          echo "Package Manager failed to start within 120 seconds"
          docker logs packagemanager
          exit 1

      # Surface license errors as workflow annotations so expired keys
      # are immediately visible on the Actions run page.
      - name: Check for license errors
        if: failure() && steps.license.outputs.available == 'true'
        run: |
          LOGS=$(docker logs packagemanager 2>&1 || true)
          LICENSE_MSG=$(echo "${LOGS}" | grep -i "license" | grep -iE "expired|invalid|unable|not activated" | head -1 || true)
          if [ -n "${LICENSE_MSG}" ]; then
            echo "::error title=License Error::${LICENSE_MSG}"
            {
              echo "## License Error"
              echo ""
              echo "The Package Manager license key is expired or invalid. Update the \`RSPM_LICENSE\` repository secret."
              echo ""
              echo '```'
              echo "${LICENSE_MSG}"
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      # Provision CRAN and PyPI repositories for smoke testing
      - name: Provision smoke test repositories
        if: steps.license.outputs.available == 'true'
        run: |
          echo "Creating CRAN repository..."
          docker exec packagemanager /opt/rstudio-pm/bin/rspm create repo \
            --name=cran-all --type=r --description="CRAN mirror"
          docker exec packagemanager /opt/rstudio-pm/bin/rspm create source \
            --name=cran-mirror --type=cran-snapshot
          docker exec packagemanager /opt/rstudio-pm/bin/rspm subscribe \
            --repo=cran-all --source=cran-mirror

          echo "Creating PyPI repository..."
          docker exec packagemanager /opt/rstudio-pm/bin/rspm create repo \
            --name=pypi-all --type=python --description="PyPI mirror"

          echo "Repositories provisioned successfully"

      # Resolve the actual Package Manager version
      - name: Resolve Package Manager version
        if: steps.license.outputs.available == 'true'
        id: version
        run: |
          RESPONSE=$(curl -sf http://localhost:4242/__api__/status)
          VERSION=$(echo "${RESPONSE}" | jq -r '.version // empty')
          if [ -z "${VERSION}" ]; then
            # Fall back to the matrix version if API doesn't report it
            VERSION="${{ matrix.pm-version }}"
          fi
          echo "Resolved Package Manager version: ${VERSION}"
          echo "resolved=${VERSION}" >> "$GITHUB_OUTPUT"

      # Rename the check run to show the resolved version
      - name: Update job title with resolved version
        if: steps.license.outputs.available == 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const resolvedVersion = '${{ steps.version.outputs.resolved }}';
            const { data: { jobs } } = await github.rest.actions.listJobsForWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId,
            });
            const currentJob = jobs.find(
              j => j.status === 'in_progress' && j.name.includes('${{ matrix.pm-version }}')
            );
            if (currentJob) {
              await github.rest.checks.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                check_run_id: currentJob.id,
                name: `Smoke test against Package Manager ${resolvedVersion}`,
              });
            }

      # Set up Python and install VIP
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        if: steps.license.outputs.available == 'true'
        with:
          enable-cache: true

      - name: Install dependencies
        if: steps.license.outputs.available == 'true'
        run: uv sync

      # The UI smoke tests (test_ui.py) drive a real browser, so the Playwright
      # browsers must be installed. The API-only tests don't need them; the
      # browser cache keeps this cheap on repeat runs.
      - name: Resolve Playwright version
        if: steps.license.outputs.available == 'true'
        id: playwright-version
        run: echo "version=$(uv run playwright --version | awk '{print $2}')" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        if: steps.license.outputs.available == 'true'
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.license.outputs.available == 'true'
        run: uv run vip install --skip-system

      # Generate vip.toml for CI Package Manager
      - name: Configure VIP for CI Package Manager
        if: steps.license.outputs.available == 'true'
        run: |
          cat > vip.toml << EOF
          [general]
          deployment_name = "CI Package Manager"

          [package_manager]
          enabled = true
          url = "${{ steps.pm.outputs.PM_URL }}"
          version = "${{ steps.version.outputs.resolved }}"

          [auth]
          provider = "password"
          EOF

      # Run the Package Manager smoke tests
      - name: Run Package Manager smoke tests
        if: steps.license.outputs.available == 'true'
        run: |
          uv run pytest \
            "src/vip_tests/prerequisites/test_components.py::test_product_server_is_reachable[Package Manager]" \
            src/vip_tests/prerequisites/test_versions.py \
            src/vip_tests/package_manager/test_repos.py \
            src/vip_tests/package_manager/test_binary_packages.py \
            src/vip_tests/package_manager/test_authenticated_repos.py \
            src/vip_tests/package_manager/test_private_repos.py \
            src/vip_tests/package_manager/test_ui.py \
            -v \
            --vip-config=vip.toml \
            --junitxml=smoke-results.xml

      # Upload test results for debugging failures
      - name: Upload test results
        if: always() && steps.license.outputs.available == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: pm-smoke-results-${{ matrix.pm-version }}
          path: smoke-results.xml

      # Write a rich job summary with test details
      - name: Write workflow summary
        if: always()
        run: |
          if [ "${{ steps.license.outputs.available }}" != "true" ]; then
            {
              echo "## Package Manager Smoke Tests — Skipped"
              echo ""
              echo "> RSPM_LICENSE secret is not configured. Add it to run PM smoke tests."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          RESOLVED="${{ steps.version.outputs.resolved }}"
          PM_URL="${{ steps.pm.outputs.PM_URL }}"
          REQUESTED="${{ matrix.pm-version }}"
          RUN_DATE=$(date -u '+%Y-%m-%d %H:%M UTC')
          {
            echo "## 🧪 Package Manager Smoke Tests — v${RESOLVED}"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| 🏷️ **Requested version** | \`${REQUESTED}\` |"
            echo "| ✅ **Resolved version** | \`${RESOLVED}\` |"
            echo "| 🌐 **Package Manager URL** | \`${PM_URL}\` |"
            echo "| 📅 **Run date** | ${RUN_DATE} |"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"
          if [ -f smoke-results.xml ]; then
            TESTS=$(grep -oP '(?<=tests=")[^"]+' smoke-results.xml | head -1 || echo 0)
            FAILURES=$(grep -oP '(?<=failures=")[^"]+' smoke-results.xml | head -1 || echo 0)
            ERRORS=$(grep -oP '(?<=errors=")[^"]+' smoke-results.xml | head -1 || echo 0)
            SKIPPED=$(grep -oP '(?<=skipped=")[^"]+' smoke-results.xml | head -1 || echo 0)
            TESTS=${TESTS:-0}; FAILURES=${FAILURES:-0}; ERRORS=${ERRORS:-0}; SKIPPED=${SKIPPED:-0}
            PASSED=$(( TESTS - FAILURES - ERRORS - SKIPPED ))
            {
              echo "### 📊 Test Results"
              echo ""
              echo "| Result | Count |"
              echo "|--------|-------|"
              echo "| ✅ Passed | ${PASSED} |"
              echo "| ❌ Failed | ${FAILURES:-0} |"
              echo "| ⚠️ Errors | ${ERRORS:-0} |"
              echo "| ⏭️ Skipped | ${SKIPPED:-0} |"
              echo "| 📝 **Total** | **${TESTS:-0}** |"
              echo ""
              if [ "${FAILURES:-0}" = "0" ] && [ "${ERRORS:-0}" = "0" ]; then
                echo "🎉 **All tests passed!**"
              else
                echo "💥 **Some tests failed — check the logs for details.**"
              fi
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "> ⚠️ Test results file not found — tests may have been skipped." >> "$GITHUB_STEP_SUMMARY"
          fi

      # Stop Package Manager
      - name: Stop Package Manager
        if: always() && steps.license.outputs.available == 'true'
        run: docker stop packagemanager && docker rm packagemanager || true

  status:
    name: Package Manager Smoke Tests Status
    if: always()
    needs: [changes, packagemanager-smoke]
    runs-on: ubuntu-latest
    steps:
      - name: Check smoke test result
        run: |
          if [ "${{ needs.changes.result }}" = "failure" ] || [ "${{ needs.changes.result }}" = "cancelled" ]; then
            echo "Change-detection job failed; cannot confirm smoke scope"
            exit 1
          fi
          if [ "${{ needs.packagemanager-smoke.result }}" = "failure" ] || [ "${{ needs.packagemanager-smoke.result }}" = "cancelled" ]; then
            echo "Package Manager smoke tests failed or were cancelled"
            exit 1
          fi
          echo "Package Manager smoke tests passed or were skipped"
